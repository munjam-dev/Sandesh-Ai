<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none">
  <!-- Geometric stacked chevron icon -->
  <g transform="translate(0, 6)">
    <!-- Top chevron -->
    <polygon points="12,0 24,8 20,11 12,6 4,11 0,8" fill="white"/>
    <!-- Middle chevron -->
    <polygon points="12,10 24,18 20,21 12,16 4,21 0,18" fill="white" opacity="0.75"/>
    <!-- Bottom chevron -->
    <polygon points="12,20 24,28 20,31 12,26 4,31 0,28" fill="white" opacity="0.5"/>
  </g>
  <!-- Sandesh Ai text -->
  <text x="36" y="40" font-family="Inter, -apple-system, sans-serif" font-size="26" font-weight="700" fill="white" letter-spacing="-0.5">Sandesh Ai</text>
  <!-- TM superscript -->
  <text x="212" y="26" font-family="Inter, -apple-system, sans-serif" font-size="11" font-weight="500" fill="white" opacity="0.8">™</text>
</svg>
